<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg2)"/>

  <!-- BG accents -->
  <circle cx="200" cy="560" r="250" fill="#06C755" opacity="0.05"/>
  <circle cx="1100" cy="160" r="200" fill="#FF6B35" opacity="0.05"/>

  <!-- Phone mockup (LINE) -->
  <g filter="url(#s2)">
    <rect x="390" y="40" width="260" height="640" rx="36" fill="#1c1c1e" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.12"/>
    <!-- Notch -->
    <rect x="480" y="40" width="80" height="28" rx="0" fill="#1c1c1e"/>
    <rect x="490" y="54" width="60" height="8" rx="4" fill="#2c2c2e"/>
    <!-- Screen -->
    <rect x="396" y="68" width="248" height="596" rx="28" fill="#efeff4"/>

    <!-- LINE header -->
    <rect x="396" y="68" width="248" height="64" rx="0" fill="#06C755"/>
    <rect x="396" y="68" width="248" height="8" rx="4" fill="#06C755"/>
    <!-- LINE logo -->
    <circle cx="424" cy="100" r="18" fill="white" fill-opacity="0.2"/>
    <text x="424" y="107" fill="white" font-size="16" text-anchor="middle">💬</text>
    <text x="480" y="96" fill="white" font-size="14" font-weight="bold">Shopping Bot</text>
    <text x="480" y="112" fill="white" font-size="10" fill-opacity="0.8">LINE Notification</text>

    <!-- Chat messages -->
    <!-- Timestamp -->
    <text x="520" y="152" fill="#8e8e93" font-size="10" text-anchor="middle">Today 00:00</text>

    <!-- Bot message 1 -->
    <rect x="406" y="162" width="180" height="72" rx="14" fill="white"/>
    <rect x="406" y="196" width="14" height="14" rx="0" fill="white" transform="translate(0, -7)"/>
    <text x="418" y="180" fill="#1c1c1e" font-size="10" font-weight="bold">🛒 Purchase Attempt</text>
    <text x="418" y="196" fill="#3c3c43" font-size="10">iPhone 15 Pro Case</text>
    <text x="418" y="212" fill="#3c3c43" font-size="10">฿ 1,199  ×  2 units</text>
    <text x="418" y="225" fill="#8e8e93" font-size="9">lazada.co.th/products/123…</text>

    <!-- Bot message 2 — success -->
    <rect x="406" y="248" width="200" height="80" rx="14" fill="white"/>
    <text x="418" y="266" fill="#1c1c1e" font-size="10" font-weight="bold">✅ Purchase Success!</text>
    <text x="418" y="282" fill="#3c3c43" font-size="10">Order #LAZ-20241212-0042</text>
    <text x="418" y="298" fill="#3c3c43" font-size="10">Total: ฿ 2,398</text>
    <text x="418" y="314" fill="#8e8e93" font-size="9">Payment: Credit Card ···4242</text>
    <text x="418" y="322" fill="#8e8e93" font-size="9">00:00:01.34 · 2024-12-12</text>

    <!-- Bot message 3 — scheduled -->
    <rect x="406" y="342" width="190" height="66" rx="14" fill="white"/>
    <text x="418" y="360" fill="#1c1c1e" font-size="10" font-weight="bold">📅 Next Scheduled Buy</text>
    <text x="418" y="376" fill="#3c3c43" font-size="10">Nike Air Max 90</text>
    <text x="418" y="392" fill="#3c3c43" font-size="10">2024-12-25  08:00:00</text>
    <text x="418" y="401" fill="#FF6B35" font-size="9">Max price: ฿ 3,500</text>

    <!-- Input bar -->
    <rect x="396" y="624" width="248" height="40" rx="0" fill="white"/>
    <rect x="396" y="624" width="248" height="4" rx="0" fill="#c7c7cc"/>
    <rect x="406" y="632" width="180" height="24" rx="12" fill="#efeff4"/>
    <text x="500" y="648" fill="#8e8e93" font-size="10" text-anchor="middle">Message…</text>
    <circle cx="608" cy="644" r="14" fill="#06C755"/>
    <text x="608" y="649" fill="white" font-size="14" text-anchor="middle">↑</text>
  </g>

  <!-- Express / Node backend panel -->
  <g filter="url(#s2)">
    <rect x="700" y="100" width="440" height="500" rx="16" fill="#1e1e1e" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
    <!-- Terminal header -->
    <rect x="700" y="100" width="440" height="40" rx="16" fill="#2d2d2d"/>
    <rect x="700" y="124" width="440" height="16" fill="#2d2d2d"/>
    <circle cx="724" cy="120" r="6" fill="#FF5F57"/>
    <circle cx="744" cy="120" r="6" fill="#FEBC2E"/>
    <circle cx="764" cy="120" r="6" fill="#28C840"/>
    <text x="920" y="125" fill="#ffffff" fill-opacity="0.5" font-size="11" text-anchor="middle">shopping-bot-expressjs-api</text>

    <!-- Code / log lines -->
    <text x="720" y="162" fill="#6bca6b" font-size="11" font-family="monospace">$ node index.js</text>
    <text x="720" y="180" fill="#ffffff" fill-opacity="0.6" font-size="11" font-family="monospace">🚀 Server running on :3001</text>
    <text x="720" y="198" fill="#ffffff" fill-opacity="0.6" font-size="11" font-family="monospace">📦 Prisma client ready</text>
    <text x="720" y="216" fill="#ffffff" fill-opacity="0.4" font-size="11" font-family="monospace">────────────────────────────────────</text>
    <text x="720" y="234" fill="#569cd6" font-size="11" font-family="monospace">[00:00:00] cron job started</text>
    <text x="720" y="252" fill="#9cdcfe" font-size="11" font-family="monospace">  → Checking scheduled tasks…</text>
    <text x="720" y="270" fill="#9cdcfe" font-size="11" font-family="monospace">  → Found 1 task due now</text>
    <text x="720" y="288" fill="#ce9178" font-size="11" font-family="monospace">  → product: iPhone 15 Pro Case</text>
    <text x="720" y="306" fill="#ce9178" font-size="11" font-family="monospace">  → url: lazada.co.th/products/123</text>
    <text x="720" y="324" fill="#4ec9b0" font-size="11" font-family="monospace">  → Sending buy request…</text>
    <text x="720" y="342" fill="#6bca6b" font-size="11" font-family="monospace">  ✔ Order placed: LAZ-20241212-0042</text>
    <text x="720" y="360" fill="#4ec9b0" font-size="11" font-family="monospace">  → LINE notify sent ✔</text>
    <text x="720" y="378" fill="#ffffff" fill-opacity="0.4" font-size="11" font-family="monospace">────────────────────────────────────</text>
    <text x="720" y="396" fill="#569cd6" font-size="11" font-family="monospace">POST /api/schedule  201  45ms</text>
    <text x="720" y="414" fill="#569cd6" font-size="11" font-family="monospace">GET  /api/history   200  12ms</text>
    <text x="720" y="432" fill="#569cd6" font-size="11" font-family="monospace">POST /api/auth/login 200  28ms</text>

    <!-- Blinking cursor -->
    <rect x="720" y="450" width="8" height="16" rx="1" fill="#ffffff" fill-opacity="0.7">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="640" y="692" fill="#ffffff" fill-opacity="0.35" font-size="12" text-anchor="middle">LINE Bot Notification + Express Backend</text>
</svg>
