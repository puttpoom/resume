<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#FF6B35" opacity="0.06"/>
  <circle cx="1180" cy="620" r="160" fill="#FF6B35" opacity="0.06"/>

  <!-- Browser window mockup -->
  <g filter="url(#shadow)">
    <rect x="340" y="60" width="600" height="600" rx="12" fill="#1e1e2e" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Browser chrome bar -->
    <rect x="340" y="60" width="600" height="42" rx="12" fill="#2a2a3e"/>
    <rect x="340" y="90" width="600" height="12" fill="#2a2a3e"/>
    <!-- Traffic lights -->
    <circle cx="368" cy="81" r="6" fill="#FF5F57"/>
    <circle cx="388" cy="81" r="6" fill="#FEBC2E"/>
    <circle cx="408" cy="81" r="6" fill="#28C840"/>
    <!-- Address bar -->
    <rect x="430" y="70" width="390" height="22" rx="11" fill="#ffffff" fill-opacity="0.08"/>
    <text x="530" y="85" fill="#ffffff" fill-opacity="0.5" font-size="11">lazada.co.th/products/...</text>
    <!-- Extension icon in toolbar -->
    <rect x="835" y="70" width="22" height="22" rx="4" fill="#FF6B35"/>
    <text x="846" y="85" fill="white" font-size="11" text-anchor="middle">🤖</text>
  </g>

  <!-- Extension popup -->
  <g filter="url(#shadow)">
    <rect x="760" y="102" width="180" height="340" rx="10" fill="#1a1a2e" stroke="#FF6B35" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Popup header -->
    <rect x="760" y="102" width="180" height="48" rx="10" fill="#FF6B35"/>
    <rect x="760" y="122" width="180" height="28" fill="#FF6B35"/>
    <text x="850" y="132" fill="white" font-size="13" font-weight="bold" text-anchor="middle">🤖 Shopping Bot</text>
    <text x="850" y="146" fill="white" font-size="9" fill-opacity="0.85" text-anchor="middle">Lazada Auto-Buy</text>

    <!-- Product URL input -->
    <text x="775" y="172" fill="#ffffff" fill-opacity="0.6" font-size="9">PRODUCT URL</text>
    <rect x="770" y="176" width="160" height="26" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="780" y="193" fill="#ffffff" fill-opacity="0.4" font-size="9">https://lazada.co.th/…</text>

    <!-- Price / Qty row -->
    <text x="775" y="222" fill="#ffffff" fill-opacity="0.6" font-size="9">MAX PRICE (฿)</text>
    <rect x="770" y="226" width="72" height="26" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="806" y="243" fill="white" font-size="11" text-anchor="middle">1,200</text>

    <text x="855" y="222" fill="#ffffff" fill-opacity="0.6" font-size="9">QTY</text>
    <rect x="858" y="226" width="72" height="26" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="894" y="243" fill="white" font-size="11" text-anchor="middle">2</text>

    <!-- Schedule time -->
    <text x="775" y="272" fill="#ffffff" fill-opacity="0.6" font-size="9">SCHEDULE TIME</text>
    <rect x="770" y="276" width="160" height="26" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="850" y="293" fill="white" font-size="11" text-anchor="middle">2024-12-12  00:00:01</text>

    <!-- LINE notify toggle -->
    <text x="775" y="322" fill="#ffffff" fill-opacity="0.6" font-size="9">LINE NOTIFICATION</text>
    <rect x="880" y="312" width="40" height="20" rx="10" fill="#34C759"/>
    <circle cx="910" cy="322" r="8" fill="white"/>

    <!-- Buy button -->
    <rect x="770" y="345" width="160" height="36" rx="10" fill="url(#btn)"/>
    <text x="850" y="368" fill="white" font-size="13" font-weight="bold" text-anchor="middle">⚡ Schedule Buy</text>

    <!-- Status -->
    <text x="850" y="418" fill="#34C759" font-size="9" text-anchor="middle">● Connected · Device verified</text>
    <text x="850" y="432" fill="#ffffff" fill-opacity="0.4" font-size="8" text-anchor="middle">FingerprintJS ID: f4a9b2c1…</text>
  </g>

  <!-- Page content (blurred background of lazada) -->
  <rect x="340" y="102" width="420" height="558" fill="#f5f5f5" fill-opacity="0.03"/>
  <rect x="360" y="130" width="100" height="14" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="360" y="154" width="200" height="10" rx="3" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="360" y="172" width="160" height="10" rx="3" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="360" y="200" width="380" height="180" rx="8" fill="#FF6B35" fill-opacity="0.08"/>
  <rect x="360" y="396" width="100" height="28" rx="6" fill="#FF6B35" fill-opacity="0.3"/>

  <!-- Label -->
  <text x="640" y="688" fill="#ffffff" fill-opacity="0.35" font-size="12" text-anchor="middle">Chrome Extension — Popup UI</text>
</svg>
